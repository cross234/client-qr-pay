<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Moon Wallet</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg: #0a1628;
  --card: #0f1d35;
  --card2: #132444;
  --border: #1c2f52;
  --text: #faf5ef;
  --muted: #b8a99a;
  --accent: #e8d5b7;
  --accent2: #d4b896;
  --ok: #7dd3a8;
  --bad: #e88b8b;
  --warn: #e8c86b;
  --shadow: 0 12px 30px rgba(0,0,0,.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 0;
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(30, 60, 114, 0.4) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(15, 40, 80, 0.3) 0%, transparent 60%);
}

.container {
  width: 100%;
  max-width: 480px;
  padding: 20px;
  padding-bottom: 40px;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  padding: 4px 0;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-logo {
  width: 42px; height: 42px;
  border-radius: 13px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; overflow: hidden;
}

.header-title {
  font-size: 20px; font-weight: 700; letter-spacing: -0.3px;
}

.header-greeting {
  color: var(--muted); font-size: 13px;
}

.header-avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  color: var(--bg); font-weight: 700; font-size: 16px;
  cursor: pointer; transition: all 0.2s ease;
  overflow: hidden; flex-shrink: 0;
}
.header-avatar img {
  width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
}
.header-avatar:hover { border-color: var(--accent); }

/* Balance card */
.balance-card {
  background: linear-gradient(145deg, var(--card), var(--card2));
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px 24px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
  position: relative; overflow: hidden;
}

.balance-card::before {
  content: ''; position: absolute; top: -40px; right: -40px;
  width: 120px; height: 120px;
  background: radial-gradient(circle, rgba(232,213,183,0.06) 0%, transparent 70%);
  border-radius: 50%;
}

.balance-label {
  color: var(--muted); font-size: 13px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
}

.balance-amount {
  font-size: 40px; font-weight: 800; letter-spacing: -1.5px;
  line-height: 1.1; margin-bottom: 4px;
}

.balance-currency {
  color: var(--accent); font-size: 20px; font-weight: 600; margin-left: 6px;
}

.balance-rub {
  color: var(--muted); font-size: 16px; font-weight: 500; margin-top: 6px;
}

.balance-rate {
  color: var(--muted); font-size: 13px; margin-top: 10px;
  display: flex; align-items: center; gap: 6px;
}

.rate-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--ok); display: inline-block;
}

/* Quick actions */
.section-title {
  font-size: 16px; font-weight: 700; margin-bottom: 14px; color: var(--text);
}

.actions-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; margin-bottom: 28px;
}

.action-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 20px 16px;
  text-decoration: none; color: var(--text);
  transition: all 0.3s ease;
  display: flex; flex-direction: column; gap: 10px; cursor: pointer;
}
.action-card:hover {
  border-color: var(--accent2); transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.action-card:active { transform: translateY(0); }
.action-icon { font-size: 28px; line-height: 1; }
.action-label { font-size: 14px; font-weight: 600; }
.action-desc { font-size: 12px; color: var(--muted); line-height: 1.3; }

/* Recent payments */
.recent-section { margin-top: 4px; }
.recent-list { display: flex; flex-direction: column; gap: 10px; }

.recent-item {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 16px 18px;
  display: flex; align-items: center; justify-content: space-between;
  transition: all 0.2s ease;
}
.recent-item:hover { background: var(--card2); }

.recent-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
.recent-icon {
  width: 40px; height: 40px; border-radius: 12px;
  background: rgba(232,213,183,0.08);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 18px;
}
.recent-info { min-width: 0; }
.recent-name {
  font-size: 14px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.recent-date { font-size: 12px; color: var(--muted); margin-top: 2px; }
.recent-amount { font-size: 15px; font-weight: 700; white-space: nowrap; padding-left: 12px; }
.recent-amount.negative { color: var(--bad); }
.recent-amount.positive { color: var(--ok); }

.empty-state {
  text-align: center; padding: 32px 16px; color: var(--muted);
  font-size: 14px; background: var(--card);
  border: 1px solid var(--border); border-radius: 16px;
}

/* Loading skeleton */
.skeleton {
  background: linear-gradient(90deg, var(--card2) 25%, var(--border) 50%, var(--card2) 75%);
  background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px;
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.balance-skeleton { height: 44px; width: 180px; margin-bottom: 8px; }
.rub-skeleton { height: 20px; width: 120px; margin-top: 6px; }
.rate-skeleton { height: 16px; width: 140px; }

/* Stats overlay */
.stats-overlay {
  position: fixed; inset: 0;
  background: rgba(5,10,20,0.85);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  z-index: 100; display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; visibility: hidden; transition: all 0.3s ease;
}
.stats-overlay.active { opacity: 1; visibility: visible; }

.stats-panel {
  width: 100%; max-width: 480px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px 20px 0 0; padding: 24px 20px 40px;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
}
.stats-overlay.active .stats-panel { transform: translateY(0); }

.stats-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
.stats-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.stats-title { font-size: 18px; font-weight: 700; }
.stats-close {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--border); background: transparent;
  color: var(--muted); font-size: 18px;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
}
.stats-close:hover { border-color: var(--accent2); color: var(--text); }

.stats-user-info {
  display: flex; align-items: center; gap: 12px;
  padding-bottom: 16px; margin-bottom: 16px; border-bottom: 1px solid var(--border);
}
.stats-user-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  color: var(--bg); font-weight: 700; font-size: 17px;
  flex-shrink: 0; overflow: hidden;
}
.stats-user-avatar img { width: 100%; height: 100%; object-fit: cover; }
.stats-user-name { font-size: 15px; font-weight: 600; }
.stats-user-username { font-size: 13px; color: var(--muted); margin-top: 2px; }
.stats-user-date { font-size: 12px; color: var(--muted); margin-top: 2px; }

.stats-grid { display: flex; flex-direction: column; gap: 10px; }
.stats-row {
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.stats-row-label { font-size: 14px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
.stats-row-value { font-size: 14px; font-weight: 600; text-align: right; }
.stats-loading { text-align: center; padding: 30px; color: var(--muted); font-size: 14px; }

/* Fade in */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeUp 0.5s ease forwards; }
.fade-in-delay-1 { animation-delay: 0.1s; opacity: 0; }
.fade-in-delay-2 { animation-delay: 0.2s; opacity: 0; }
.fade-in-delay-3 { animation-delay: 0.3s; opacity: 0; }
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header fade-in">
    <div class="header-left">
      <div class="header-logo">
        <svg viewBox="0 0 100 100" width="42" height="42">
          <rect width="100" height="100" rx="20" fill="#101d36"/>
          <path d="M65,20 A35,35 0 1,0 65,80 A25,25 0 1,1 65,20Z" fill="#f0e6d2"/>
        </svg>
      </div>
      <div>
        <div class="header-title">Moon Wallet</div>
        <div class="header-greeting" id="greeting">Загрузка...</div>
      </div>
    </div>
    <div class="header-avatar" id="avatar" title="Профиль">?</div>
  </div>

  <!-- Balance -->
  <div class="balance-card fade-in fade-in-delay-1">
    <div class="balance-label">Баланс</div>
    <div id="balanceDisplay">
      <div class="skeleton balance-skeleton"></div>
      <div class="skeleton rub-skeleton"></div>
      <div class="skeleton rate-skeleton" style="margin-top:10px"></div>
    </div>
    <div id="balanceLoaded" style="display:none">
      <div class="balance-amount">
        <span id="balanceValue">0.00</span>
        <span class="balance-currency">USDT</span>
      </div>
      <div class="balance-rub" id="balanceRub"></div>
      <div class="balance-rate">
        <span class="rate-dot"></span>
        <span id="rateDisplay">1 USDT = ...</span>
      </div>
    </div>
  </div>

  <!-- Quick actions -->
  <div class="fade-in fade-in-delay-2">
    <div class="section-title">Быстрые действия</div>
    <div class="actions-grid">
      <a class="action-card" href="qr-pay.html">
        <div class="action-icon">📱</div>
        <div class="action-label">QR Оплата</div>
        <div class="action-desc">Сканировать и оплатить</div>
      </a>
      <a class="action-card" href="deposit.html">
        <div class="action-icon">💰</div>
        <div class="action-label">Пополнить</div>
        <div class="action-desc">Добавить средства</div>
      </a>
      <a class="action-card" href="withdraw.html">
        <div class="action-icon">💸</div>
        <div class="action-label">Вывести</div>
        <div class="action-desc">Вывод средств</div>
      </a>
      <a class="action-card" href="history.html">
        <div class="action-icon">📋</div>
        <div class="action-label">История</div>
        <div class="action-desc">Все транзакции</div>
      </a>
    </div>
  </div>

  <!-- Recent payments -->
  <div class="recent-section fade-in fade-in-delay-3">
    <div class="section-title">Последние QR-платежи</div>
    <div class="recent-list" id="recentList">
      <div class="empty-state">Загрузка...</div>
    </div>
  </div>
</div>

<!-- Stats overlay -->
<div class="stats-overlay" id="statsOverlay">
  <div class="stats-panel">
    <div class="stats-handle"></div>
    <div class="stats-header">
      <div class="stats-title">Профиль</div>
      <button class="stats-close" id="statsClose">&times;</button>
    </div>
    <div id="statsContent">
      <div class="stats-loading">Загрузка...</div>
    </div>
  </div>
</div>

<script>
(function() {
  const tgApp = window.Telegram && window.Telegram.WebApp;
  if (tgApp) { try { tgApp.ready(); tgApp.expand(); } catch(_){} }

  const API = 'https://client-qr-pay.kireeshka73.workers.dev';
  let currentUser = null;
  let currentRate = null;
  let userPhotoUrl = null;

  // ── Auto-auth: try token, then TG initData ──
  async function autoAuth() {
    let token = localStorage.getItem('auth_token');

    // Try existing token
    if (token) {
      try {
        const resp = await fetch(API + '/api/me', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (resp.ok) {
          const data = await resp.json();
          localStorage.setItem('worker_base', API);
          return { token, data };
        }
      } catch {}
      localStorage.removeItem('auth_token');
      token = null;
    }

    // Auto-auth via TG initData
    if (tgApp && tgApp.initData && tgApp.initData.length > 0) {
      try {
        const resp = await fetch(API + '/api/auth/telegram', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ initData: tgApp.initData })
        });
        if (resp.ok) {
          const authData = await resp.json();
          if (authData.token) {
            localStorage.setItem('auth_token', authData.token);
            localStorage.setItem('worker_base', API);
            return { token: authData.token, data: authData };
          }
        }
      } catch(e) { console.error('TG auth error:', e); }
    }

    return null;
  }

  // ── Helpers ──
  function getGreeting() {
    const h = new Date().getHours();
    if (h < 6) return 'Доброй ночи';
    if (h < 12) return 'Доброе утро';
    if (h < 18) return 'Добрый день';
    return 'Добрый вечер';
  }

  function formatNumber(num, decimals) {
    if (decimals === undefined) decimals = 2;
    return Number(num).toLocaleString('ru-RU', {
      minimumFractionDigits: decimals, maximumFractionDigits: decimals
    });
  }

  function formatDate(ts) {
    if (!ts) return '';
    try {
      const d = new Date(typeof ts === 'number' ? ts : ts);
      return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
    } catch { return ''; }
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  function setAvatarEl(el, photoUrl, name) {
    if (photoUrl) {
      el.innerHTML = '<img src="' + escapeHtml(photoUrl) + '" alt="" onerror="this.parentNode.textContent=\'' + escapeHtml((name||'?').charAt(0).toUpperCase()) + '\'">';
    } else {
      el.textContent = (name || '?').charAt(0).toUpperCase();
    }
  }

  // ── Show user data ──
  function showUserData(data) {
    const user = data.user || data;
    currentUser = user;
    currentRate = data.rate || null;

    const name = user.firstName || user.first_name || user.username || 'User';

    // Photo
    userPhotoUrl = user.photoUrl || user.photo_url || null;
    if (!userPhotoUrl && tgApp && tgApp.initDataUnsafe && tgApp.initDataUnsafe.user) {
      userPhotoUrl = tgApp.initDataUnsafe.user.photo_url || null;
    }

    // Header
    document.getElementById('greeting').textContent = getGreeting() + ', ' + name;
    setAvatarEl(document.getElementById('avatar'), userPhotoUrl, name);

    // Balance
    const balance = parseFloat(user.balance || 0);
    document.getElementById('balanceValue').textContent = formatNumber(balance);

    if (currentRate && currentRate > 0) {
      document.getElementById('balanceRub').textContent = '≈ ' + formatNumber(balance * currentRate, 2) + ' ₽';
      document.getElementById('rateDisplay').textContent = '1 USDT = ' + formatNumber(currentRate, 2) + ' ₽';
    } else {
      document.getElementById('balanceRub').textContent = '';
      document.getElementById('rateDisplay').textContent = 'Курс недоступен';
    }

    document.getElementById('balanceDisplay').style.display = 'none';
    document.getElementById('balanceLoaded').style.display = 'block';
  }

  // ── Recent QR payments ──
  async function loadRecent(token) {
    const listEl = document.getElementById('recentList');
    try {
      const resp = await fetch(API + '/api/qr/history', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (!resp.ok) { listEl.innerHTML = '<div class="empty-state">Не удалось загрузить</div>'; return; }

      const data = await resp.json();
      const items = (data.items || []).slice(0, 3);

      if (items.length === 0) {
        listEl.innerHTML = '<div class="empty-state">Пока нет QR-платежей</div>';
        return;
      }

      listEl.innerHTML = '';
      items.forEach(function(item) {
        const div = document.createElement('div');
        div.className = 'recent-item';
        const amtRub = parseFloat(item.amountRub || 0);
        const amtUsdt = parseFloat(item.amountUsdt || 0);
        const date = formatDate(item.createdAt);
        const status = item.status === 'PAID' ? '✅' : item.status === 'REJECTED' ? '❌' : '⏳';

        div.innerHTML =
          '<div class="recent-left">' +
            '<div class="recent-icon">' + status + '</div>' +
            '<div class="recent-info">' +
              '<div class="recent-name">' + formatNumber(amtRub, 0) + ' ₽</div>' +
              '<div class="recent-date">' + date + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="recent-amount negative">−' + formatNumber(amtUsdt) + ' USDT</div>';

        listEl.appendChild(div);
      });
    } catch {
      listEl.innerHTML = '<div class="empty-state">Ошибка загрузки</div>';
    }
  }

  // ── Stats overlay ──
  document.getElementById('avatar').addEventListener('click', function() {
    document.getElementById('statsOverlay').classList.add('active');
    loadStats();
  });
  document.getElementById('statsClose').addEventListener('click', function() {
    document.getElementById('statsOverlay').classList.remove('active');
  });
  document.getElementById('statsOverlay').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('active');
  });

  async function loadStats() {
    const content = document.getElementById('statsContent');
    content.innerHTML = '<div class="stats-loading">Загрузка...</div>';

    const token = localStorage.getItem('auth_token');
    if (!token || !currentUser) return;

    try {
      const resp = await fetch(API + '/api/user/stats', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const raw = resp.ok ? await resp.json() : {};
      const s = raw.stats || {};

      const name = currentUser.firstName || currentUser.first_name || currentUser.username || 'User';
      const username = currentUser.username ? ('@' + currentUser.username) : '';
      const regDate = s.createdAt || currentUser.createdAt || 0;
      let dateStr = '';
      if (regDate) {
        try { dateStr = new Date(regDate).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' }); } catch {}
      }

      const qp = s.qrPayments || {};
      const dp = s.deposits || {};
      const wd = s.withdrawals || {};

      const avatarHtml = userPhotoUrl
        ? '<div class="stats-user-avatar"><img src="' + escapeHtml(userPhotoUrl) + '"></div>'
        : '<div class="stats-user-avatar">' + escapeHtml(name.charAt(0).toUpperCase()) + '</div>';

      content.innerHTML =
        '<div class="stats-user-info">' +
          avatarHtml +
          '<div>' +
            '<div class="stats-user-name">' + escapeHtml(name) + '</div>' +
            (username ? '<div class="stats-user-username">' + escapeHtml(username) + '</div>' : '') +
            (dateStr ? '<div class="stats-user-date">С ' + dateStr + '</div>' : '') +
          '</div>' +
        '</div>' +
        '<div class="stats-grid">' +
          '<div class="stats-row"><div class="stats-row-label">📱 QR-платежи</div><div class="stats-row-value">' + (qp.count||0) + ' / ' + formatNumber(qp.sumUsdt||0) + ' USDT</div></div>' +
          '<div class="stats-row"><div class="stats-row-label">💰 Пополнения</div><div class="stats-row-value">' + (dp.count||0) + ' / ' + formatNumber(dp.sumUsdt||0) + ' USDT</div></div>' +
          '<div class="stats-row"><div class="stats-row-label">💸 Выводы</div><div class="stats-row-value">' + (wd.count||0) + ' / ' + formatNumber(wd.sumUsdt||0) + ' USDT</div></div>' +
        '</div>';
    } catch {
      content.innerHTML = '<div class="stats-loading">Не удалось загрузить</div>';
    }
  }

  // ── Init ──
  autoAuth().then(function(result) {
    if (result) {
      showUserData(result.data);
      loadRecent(result.token);
    } else {
      // Can't auth — show message
      document.getElementById('greeting').textContent = 'Откройте через бота @Moon_walets_bot';
      document.getElementById('recentList').innerHTML = '<div class="empty-state">Войдите через Telegram бота</div>';
      document.getElementById('balanceDisplay').style.display = 'none';
      document.getElementById('balanceLoaded').style.display = 'block';
    }
  }).catch(function() {
    document.getElementById('greeting').textContent = 'Ошибка загрузки';
  });
})();
</script>
</body>
</html>
