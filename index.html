<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QR Pay</title>
<style>
:root {
  --bg: #0a1628;
  --card: #0f1d35;
  --card2: #132444;
  --border: #1c2f52;
  --text: #faf5ef;
  --muted: #b8a99a;
  --accent: #e8d5b7;
  --accent2: #d4b896;
  --ok: #7dd3a8;
  --bad: #e88b8b;
  --warn: #e8c86b;
  --shadow: 0 12px 30px rgba(0,0,0,.4);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 0;
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(30, 60, 114, 0.4) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(15, 40, 80, 0.3) 0%, transparent 60%);
}

.container {
  width: 100%;
  max-width: 480px;
  padding: 20px;
  padding-bottom: 40px;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  padding: 4px 0;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-logo {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.header-logo svg {
  width: 22px;
  height: 22px;
}

.header-title {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.header-greeting {
  color: var(--muted);
  font-size: 13px;
}

.header-avatar {
  width: 40px;
  height: 40px;
  border-radius: 13px;
  background: var(--card2);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent);
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.header-avatar:hover {
  border-color: var(--accent);
}

/* Balance card */
.balance-card {
  background: linear-gradient(145deg, var(--card), var(--card2));
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px 24px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}

.balance-card::before {
  content: '';
  position: absolute;
  top: -40px;
  right: -40px;
  width: 120px;
  height: 120px;
  background: radial-gradient(circle, rgba(232, 213, 183, 0.06) 0%, transparent 70%);
  border-radius: 50%;
}

.balance-label {
  color: var(--muted);
  font-size: 13px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.balance-amount {
  font-size: 40px;
  font-weight: 800;
  letter-spacing: -1.5px;
  line-height: 1.1;
  margin-bottom: 4px;
}

.balance-currency {
  color: var(--accent);
  font-size: 20px;
  font-weight: 600;
  margin-left: 6px;
}

.balance-rate {
  color: var(--muted);
  font-size: 13px;
  margin-top: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.rate-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--ok);
  display: inline-block;
}

/* Quick actions */
.section-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 14px;
  color: var(--text);
}

.actions-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 28px;
}

.action-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 16px;
  text-decoration: none;
  color: var(--text);
  transition: all 0.3s ease;
  display: flex;
  flex-direction: column;
  gap: 10px;
  cursor: pointer;
}

.action-card:hover {
  border-color: var(--accent2);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}

.action-card:active {
  transform: translateY(0);
}

.action-icon {
  font-size: 28px;
  line-height: 1;
}

.action-label {
  font-size: 14px;
  font-weight: 600;
}

.action-desc {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.3;
}

/* Recent payments */
.recent-section {
  margin-top: 4px;
}

.recent-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.recent-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: all 0.2s ease;
}

.recent-item:hover {
  border-color: var(--border);
  background: var(--card2);
}

.recent-left {
  display: flex;
  align-items: center;
  gap: 14px;
  min-width: 0;
}

.recent-icon {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: rgba(232, 213, 183, 0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 18px;
}

.recent-info {
  min-width: 0;
}

.recent-name {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.recent-date {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}

.recent-amount {
  font-size: 15px;
  font-weight: 700;
  white-space: nowrap;
  padding-left: 12px;
}

.recent-amount.negative {
  color: var(--bad);
}

.recent-amount.positive {
  color: var(--ok);
}

.empty-state {
  text-align: center;
  padding: 32px 16px;
  color: var(--muted);
  font-size: 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
}

/* Loading skeleton */
.skeleton {
  background: linear-gradient(90deg, var(--card2) 25%, var(--border) 50%, var(--card2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 8px;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.balance-skeleton {
  height: 44px;
  width: 180px;
  margin-bottom: 8px;
}

.rate-skeleton {
  height: 16px;
  width: 140px;
}

/* Logout */
.logout-btn {
  display: block;
  width: 100%;
  padding: 14px;
  margin-top: 24px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 14px;
  color: var(--muted);
  font-size: 14px;
  font-weight: 500;
  font-family: system-ui;
  cursor: pointer;
  transition: all 0.3s ease;
  text-align: center;
}

.logout-btn:hover {
  border-color: var(--bad);
  color: var(--bad);
}

/* Fade in */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.fade-in {
  animation: fadeUp 0.5s ease forwards;
}

.fade-in-delay-1 { animation-delay: 0.1s; opacity: 0; }
.fade-in-delay-2 { animation-delay: 0.2s; opacity: 0; }
.fade-in-delay-3 { animation-delay: 0.3s; opacity: 0; }
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header fade-in">
    <div class="header-left">
      <div class="header-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0a1628" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </div>
      <div>
        <div class="header-title" id="appName">QR Pay</div>
        <div class="header-greeting" id="greeting">Загрузка...</div>
      </div>
    </div>
    <div class="header-avatar" id="avatar" title="Профиль">?</div>
  </div>

  <!-- Balance -->
  <div class="balance-card fade-in fade-in-delay-1">
    <div class="balance-label">Баланс</div>
    <div id="balanceDisplay">
      <div class="skeleton balance-skeleton"></div>
      <div class="skeleton rate-skeleton" style="margin-top:10px"></div>
    </div>
    <div id="balanceLoaded" style="display:none">
      <div class="balance-amount">
        <span id="balanceValue">0.00</span>
        <span class="balance-currency">USDT</span>
      </div>
      <div class="balance-rate">
        <span class="rate-dot"></span>
        <span id="rateDisplay">1 USDT = ...</span>
      </div>
    </div>
  </div>

  <!-- Quick actions -->
  <div class="fade-in fade-in-delay-2">
    <div class="section-title">Быстрые действия</div>
    <div class="actions-grid">
      <a class="action-card" href="qr-pay.html">
        <div class="action-icon">📱</div>
        <div class="action-label">QR Оплата</div>
        <div class="action-desc">Сканировать и оплатить</div>
      </a>
      <a class="action-card" href="deposit.html">
        <div class="action-icon">💰</div>
        <div class="action-label">Пополнить</div>
        <div class="action-desc">Добавить средства</div>
      </a>
      <a class="action-card" href="withdraw.html">
        <div class="action-icon">💸</div>
        <div class="action-label">Вывести</div>
        <div class="action-desc">Вывод средств</div>
      </a>
      <a class="action-card" href="history.html">
        <div class="action-icon">📋</div>
        <div class="action-label">История</div>
        <div class="action-desc">Все транзакции</div>
      </a>
    </div>
  </div>

  <!-- Recent payments -->
  <div class="recent-section fade-in fade-in-delay-3">
    <div class="section-title">Последние QR-платежи</div>
    <div class="recent-list" id="recentList">
      <div class="empty-state">Загрузка...</div>
    </div>
  </div>

  <!-- Logout -->
  <button class="logout-btn" id="logoutBtn">Выйти из аккаунта</button>
</div>

<script>
(function() {
  const API = localStorage.getItem('worker_base') || 'https://client-qr-pay.kireeshka73.workers.dev';
  const TOKEN = localStorage.getItem('auth_token');
  const siteName = localStorage.getItem('site_name') || 'QR Pay';

  document.getElementById('appName').textContent = siteName;
  document.title = siteName;

  // Auth check
  if (!TOKEN) {
    window.location.href = 'register.html';
    return;
  }

  const headers = {
    'Authorization': 'Bearer ' + TOKEN,
    'Content-Type': 'application/json'
  };

  // Fetch user data
  async function loadUser() {
    try {
      const resp = await fetch(API + '/api/me', { headers });

      if (!resp.ok) {
        localStorage.removeItem('auth_token');
        window.location.href = 'register.html';
        return;
      }

      const data = await resp.json();
      const user = data.user || data;

      sessionStorage.setItem('user_data', JSON.stringify(user));

      // Greeting
      const name = user.first_name || user.username || 'User';
      document.getElementById('greeting').textContent = getGreeting() + ', ' + name;

      // Avatar
      const initials = (name.charAt(0) || '?').toUpperCase();
      document.getElementById('avatar').textContent = initials;

      // Balance
      const balance = parseFloat(user.balance || 0);
      document.getElementById('balanceValue').textContent = formatNumber(balance);

      // Rate
      const rate = data.rate || null;
      if (rate) {
        document.getElementById('rateDisplay').textContent = '1 USDT = ' + formatNumber(rate, 2) + ' RUB';
      } else {
        document.getElementById('rateDisplay').textContent = 'Курс недоступен';
      }

      // Show balance
      document.getElementById('balanceDisplay').style.display = 'none';
      document.getElementById('balanceLoaded').style.display = 'block';

    } catch(e) {
      localStorage.removeItem('auth_token');
      window.location.href = 'register.html';
    }
  }

  // Fetch recent QR payments
  async function loadRecent() {
    const listEl = document.getElementById('recentList');
    try {
      const resp = await fetch(API + '/api/qr/history', { headers });

      if (!resp.ok) {
        listEl.innerHTML = '<div class="empty-state">Не удалось загрузить</div>';
        return;
      }

      const data = await resp.json();
      const items = (data.items || data || []).slice(0, 3);

      if (items.length === 0) {
        listEl.innerHTML = '<div class="empty-state">Пока нет QR-платежей</div>';
        return;
      }

      listEl.innerHTML = '';
      items.forEach(function(item) {
        const div = document.createElement('div');
        div.className = 'recent-item';

        const amount = parseFloat(item.amount || 0);
        const isNeg = amount < 0 || item.type === 'payment' || item.type === 'out';
        const sign = isNeg ? '-' : '+';
        const cls = isNeg ? 'negative' : 'positive';

        const date = item.created_at || item.date || '';
        const formattedDate = formatDate(date);
        const desc = item.description || item.merchant || item.memo || 'QR-платеж';

        div.innerHTML =
          '<div class="recent-left">' +
            '<div class="recent-icon">📱</div>' +
            '<div class="recent-info">' +
              '<div class="recent-name">' + escapeHtml(desc) + '</div>' +
              '<div class="recent-date">' + formattedDate + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="recent-amount ' + cls + '">' + sign + formatNumber(Math.abs(amount)) + ' USDT</div>';

        listEl.appendChild(div);
      });

    } catch(e) {
      listEl.innerHTML = '<div class="empty-state">Ошибка загрузки</div>';
    }
  }

  // Helpers
  function getGreeting() {
    const h = new Date().getHours();
    if (h < 6) return 'Доброй ночи';
    if (h < 12) return 'Доброе утро';
    if (h < 18) return 'Добрый день';
    return 'Добрый вечер';
  }

  function formatNumber(num, decimals) {
    if (decimals === undefined) decimals = 2;
    return Number(num).toLocaleString('ru-RU', {
      minimumFractionDigits: decimals,
      maximumFractionDigits: decimals
    });
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
      const d = new Date(dateStr);
      return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
    } catch(e) {
      return dateStr;
    }
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  // Logout
  document.getElementById('logoutBtn').addEventListener('click', function() {
    localStorage.removeItem('auth_token');
    sessionStorage.removeItem('user_data');
    window.location.href = 'register.html';
  });

  // Load data
  loadUser();
  loadRecent();
})();
</script>
</body>
</html>
