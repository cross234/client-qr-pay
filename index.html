<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Moon Wallet</title>
<style>
:root {
  --bg: #0a1628;
  --card: #0f1d35;
  --card2: #132444;
  --border: #1c2f52;
  --text: #faf5ef;
  --muted: #b8a99a;
  --accent: #e8d5b7;
  --accent2: #d4b896;
  --ok: #7dd3a8;
  --bad: #e88b8b;
  --warn: #e8c86b;
  --shadow: 0 12px 30px rgba(0,0,0,.4);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 0;
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(30, 60, 114, 0.4) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(15, 40, 80, 0.3) 0%, transparent 60%);
}

.container {
  width: 100%;
  max-width: 480px;
  padding: 20px;
  padding-bottom: 40px;
}

/* Header with logo */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
  padding: 4px 0;
}

.header-logo svg {
  width: 38px;
  height: 38px;
  flex-shrink: 0;
}

.header-title {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

/* Profile section */
.profile-section {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  margin-bottom: 20px;
  cursor: pointer;
  transition: all 0.25s ease;
  -webkit-tap-highlight-color: transparent;
}

.profile-section:hover {
  border-color: var(--accent2);
  background: var(--card2);
}

.profile-section:active {
  transform: scale(0.98);
}

.profile-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--bg);
  font-weight: 700;
  font-size: 18px;
  flex-shrink: 0;
  overflow: hidden;
}

.profile-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
}

.profile-name {
  font-size: 16px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.profile-hint {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}

.profile-arrow {
  margin-left: auto;
  color: var(--muted);
  font-size: 18px;
  flex-shrink: 0;
  transition: transform 0.2s;
}

/* Balance card */
.balance-card {
  display: block;
  text-decoration: none;
  color: inherit;
  background: linear-gradient(145deg, var(--card), var(--card2));
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.25s ease;
  -webkit-tap-highlight-color: transparent;
}

.balance-card:hover {
  border-color: var(--accent2);
  box-shadow: 0 16px 40px rgba(0,0,0,.5);
}

.balance-card:active {
  transform: scale(0.98);
  box-shadow: 0 8px 20px rgba(0,0,0,.4);
}

.balance-card::before {
  content: '';
  position: absolute;
  top: -40px;
  right: -40px;
  width: 120px;
  height: 120px;
  background: radial-gradient(circle, rgba(232, 213, 183, 0.06) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

.balance-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}

.balance-label {
  color: var(--muted);
  font-size: 13px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.balance-arrow {
  color: var(--muted);
  font-size: 22px;
  transition: transform 0.2s;
}

.balance-card:hover .balance-arrow {
  transform: translateX(3px);
}

.balance-amount {
  font-size: 40px;
  font-weight: 800;
  letter-spacing: -1.5px;
  line-height: 1.1;
  margin-bottom: 4px;
}

.balance-currency {
  color: var(--accent);
  font-size: 20px;
  font-weight: 600;
  margin-left: 6px;
}

.balance-rub {
  color: var(--muted);
  font-size: 16px;
  font-weight: 500;
  margin-top: 6px;
}

.balance-rate {
  color: var(--muted);
  font-size: 12px;
  margin-top: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  opacity: 0.7;
}

.rate-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--ok);
  display: inline-block;
}

/* QR Button */
.qr-button {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  width: 100%;
  padding: 18px 24px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: var(--bg);
  border: none;
  border-radius: 16px;
  font-size: 17px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.25s ease;
  box-shadow: 0 6px 24px rgba(232, 213, 183, 0.2);
  -webkit-tap-highlight-color: transparent;
}

.qr-button:hover {
  box-shadow: 0 8px 32px rgba(232, 213, 183, 0.3);
  transform: translateY(-1px);
}

.qr-button:active {
  transform: translateY(1px) scale(0.98);
  box-shadow: 0 4px 16px rgba(232, 213, 183, 0.15);
}

.qr-button svg {
  width: 24px;
  height: 24px;
  flex-shrink: 0;
}

/* Loading skeleton */
.skeleton {
  background: linear-gradient(90deg, var(--card2) 25%, var(--border) 50%, var(--card2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 8px;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.balance-skeleton { height: 44px; width: 180px; margin-bottom: 8px; }
.rub-skeleton { height: 20px; width: 120px; margin-top: 6px; }
.rate-skeleton { height: 14px; width: 140px; margin-top: 12px; }

/* Not-in-TG message */
.not-tg {
  text-align: center;
  padding: 60px 24px;
}

.not-tg-icon {
  font-size: 56px;
  margin-bottom: 20px;
}

.not-tg-text {
  font-size: 16px;
  color: var(--muted);
  line-height: 1.5;
}

.not-tg-bot {
  display: inline-block;
  margin-top: 12px;
  color: var(--accent);
  font-weight: 600;
  font-size: 17px;
}

/* Stats overlay */
.stats-overlay {
  position: fixed;
  inset: 0;
  background: rgba(5, 10, 20, 0.85);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  z-index: 100;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;
}

.stats-overlay.active {
  opacity: 1;
  visibility: visible;
}

.stats-panel {
  width: 100%;
  max-width: 480px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  padding: 24px 20px 40px;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
}

.stats-overlay.active .stats-panel {
  transform: translateY(0);
}

.stats-handle {
  width: 40px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 20px;
}

.stats-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.stats-title {
  font-size: 18px;
  font-weight: 700;
}

.stats-close {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
}

.stats-close:hover {
  border-color: var(--accent2);
  color: var(--text);
}

.stats-user-info {
  display: flex;
  align-items: center;
  gap: 12px;
  padding-bottom: 16px;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.stats-user-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--bg);
  font-weight: 700;
  font-size: 17px;
  flex-shrink: 0;
  overflow: hidden;
}

.stats-user-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.stats-user-name {
  font-size: 15px;
  font-weight: 600;
}

.stats-user-username {
  font-size: 13px;
  color: var(--muted);
  margin-top: 2px;
}

.stats-user-date {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}

.stats-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.stats-row {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.stats-row-label {
  font-size: 14px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 8px;
}

.stats-row-label-icon {
  font-size: 16px;
}

.stats-row-value {
  font-size: 14px;
  font-weight: 600;
  text-align: right;
}

.stats-loading {
  text-align: center;
  padding: 30px;
  color: var(--muted);
  font-size: 14px;
}

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

.fade-in { animation: fadeUp 0.5s ease forwards; }
.fade-in-d1 { animation-delay: 0.08s; opacity: 0; }
.fade-in-d2 { animation-delay: 0.16s; opacity: 0; }
.fade-in-d3 { animation-delay: 0.24s; opacity: 0; }
</style>
</head>
<body>

<div class="container" id="appContainer" style="display:none">

  <!-- Header -->
  <div class="header fade-in">
    <svg viewBox="0 0 100 100" width="38" height="38">
      <rect width="100" height="100" rx="20" fill="#101d36"/>
      <path d="M65,20 A35,35 0 1,0 65,80 A25,25 0 1,1 65,20Z" fill="#f0e6d2"/>
    </svg>
    <div class="header-title">Moon Wallet</div>
  </div>

  <!-- Profile -->
  <div class="profile-section fade-in fade-in-d1" id="profileBtn">
    <div class="profile-avatar" id="avatarWrap"><span id="avatarInitials">?</span></div>
    <div>
      <div class="profile-name" id="profileName">Загрузка...</div>
      <div class="profile-hint">Статистика и профиль</div>
    </div>
    <div class="profile-arrow">&#8250;</div>
  </div>

  <!-- Balance card -->
  <a class="balance-card fade-in fade-in-d2" href="wallet.html" id="balanceCard">
    <div class="balance-top">
      <div class="balance-label">Баланс</div>
      <div class="balance-arrow">&#8250;</div>
    </div>
    <div id="balanceLoading">
      <div class="skeleton balance-skeleton"></div>
      <div class="skeleton rub-skeleton"></div>
      <div class="skeleton rate-skeleton"></div>
    </div>
    <div id="balanceLoaded" style="display:none">
      <div class="balance-amount">
        <span id="balanceValue">0.00</span>
        <span class="balance-currency">USDT</span>
      </div>
      <div class="balance-rub" id="balanceRub"></div>
      <div class="balance-rate">
        <span class="rate-dot"></span>
        <span id="rateDisplay">1 USDT = ...</span>
      </div>
    </div>
  </a>

  <!-- QR Pay button -->
  <a class="qr-button fade-in fade-in-d3" href="qr-pay.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="7" rx="1"/>
      <rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/>
      <rect x="14" y="14" width="3" height="3"/>
      <line x1="21" y1="14" x2="21" y2="17"/>
      <line x1="14" y1="21" x2="17" y2="21"/>
      <line x1="21" y1="21" x2="21" y2="21.01"/>
    </svg>
    Сканировать QR-код
  </a>
</div>

<!-- Not-in-TG fallback -->
<div class="container" id="notTgContainer" style="display:none">
  <div class="header fade-in">
    <svg viewBox="0 0 100 100" width="38" height="38">
      <rect width="100" height="100" rx="20" fill="#101d36"/>
      <path d="M65,20 A35,35 0 1,0 65,80 A25,25 0 1,1 65,20Z" fill="#f0e6d2"/>
    </svg>
    <div class="header-title">Moon Wallet</div>
  </div>
  <div class="not-tg fade-in fade-in-d1">
    <div class="not-tg-icon">🌙</div>
    <div class="not-tg-text">
      Откройте приложение через Telegram бота
      <br>
      <span class="not-tg-bot">@Moon_walets_bot</span>
    </div>
  </div>
</div>

<!-- Stats overlay -->
<div class="stats-overlay" id="statsOverlay">
  <div class="stats-panel">
    <div class="stats-handle"></div>
    <div class="stats-header">
      <div class="stats-title">Профиль</div>
      <button class="stats-close" id="statsClose">&times;</button>
    </div>
    <div id="statsContent">
      <div class="stats-loading">Загрузка...</div>
    </div>
  </div>
</div>

<script>
(function() {
  const tgApp = window.Telegram && window.Telegram.WebApp;
  if (tgApp) { tgApp.ready(); tgApp.expand(); }

  const API = 'https://client-qr-pay.kireeshka73.workers.dev';

  let currentUser = null;
  let currentRate = null;
  let userPhotoUrl = null;

  async function autoAuth() {
    // Try existing token
    let token = localStorage.getItem('auth_token');
    if (token) {
      try {
        const resp = await fetch(API + '/api/me', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (resp.ok) {
          const data = await resp.json();
          localStorage.setItem('worker_base', API);
          return data;
        }
      } catch {}
      localStorage.removeItem('auth_token');
    }

    // Auto-auth via TG initData
    if (tgApp && tgApp.initData) {
      try {
        const resp = await fetch(API + '/api/auth/telegram', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ initData: tgApp.initData })
        });
        if (resp.ok) {
          const data = await resp.json();
          localStorage.setItem('auth_token', data.token);
          localStorage.setItem('worker_base', API);
          return data;
        }
      } catch {}
    }

    return null;
  }

  function formatNumber(num, decimals) {
    if (decimals === undefined) decimals = 2;
    return Number(num).toLocaleString('ru-RU', {
      minimumFractionDigits: decimals,
      maximumFractionDigits: decimals
    });
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  function setAvatar(containerId, photoUrl, name) {
    var wrap = document.getElementById(containerId);
    if (!wrap) return;
    if (photoUrl) {
      wrap.innerHTML = '<img src="' + escapeHtml(photoUrl) + '" alt="" onerror="this.parentNode.innerHTML=\'<span>' + escapeHtml((name || '?').charAt(0).toUpperCase()) + '</span>\'">';
    } else {
      wrap.innerHTML = '<span>' + escapeHtml((name || '?').charAt(0).toUpperCase()) + '</span>';
    }
  }

  function showApp(data) {
    var user = data.user || data;
    currentUser = user;
    currentRate = data.rate || null;

    var name = user.first_name || user.username || 'User';

    // Try to get photo
    userPhotoUrl = user.photoUrl || user.photo_url || null;
    if (!userPhotoUrl && tgApp && tgApp.initDataUnsafe && tgApp.initDataUnsafe.user) {
      userPhotoUrl = tgApp.initDataUnsafe.user.photo_url || null;
    }

    // Profile section
    setAvatar('avatarWrap', userPhotoUrl, name);
    document.getElementById('profileName').textContent = name;

    // Balance
    var balance = parseFloat(user.balance || 0);
    document.getElementById('balanceValue').textContent = formatNumber(balance);

    if (currentRate) {
      var rubAmount = balance * currentRate;
      document.getElementById('balanceRub').textContent = '~ ' + formatNumber(rubAmount, 2) + ' RUB';
      document.getElementById('rateDisplay').textContent = '1 USDT = ' + formatNumber(currentRate, 2) + ' RUB';
    } else {
      document.getElementById('balanceRub').textContent = '';
      document.getElementById('rateDisplay').textContent = 'Курс недоступен';
    }

    document.getElementById('balanceLoading').style.display = 'none';
    document.getElementById('balanceLoaded').style.display = 'block';

    document.getElementById('appContainer').style.display = 'block';
  }

  function showNotTg() {
    document.getElementById('notTgContainer').style.display = 'block';
  }

  // Stats
  function openStats() {
    document.getElementById('statsOverlay').classList.add('active');
    loadStats();
  }

  function closeStats() {
    document.getElementById('statsOverlay').classList.remove('active');
  }

  async function loadStats() {
    var content = document.getElementById('statsContent');
    content.innerHTML = '<div class="stats-loading">Загрузка...</div>';

    var token = localStorage.getItem('auth_token');
    if (!token || !currentUser) return;

    try {
      var resp = await fetch(API + '/api/user/stats', {
        headers: { 'Authorization': 'Bearer ' + token }
      });

      var stats = {};
      if (resp.ok) {
        stats = await resp.json();
      }

      var user = currentUser;
      var name = user.first_name || user.username || 'User';
      var username = user.username ? ('@' + user.username) : 'Нет username';
      var regDate = user.created_at || user.registered_at || '';
      var formattedDate = '';
      if (regDate) {
        try {
          formattedDate = new Date(regDate).toLocaleDateString('ru-RU', {
            day: 'numeric', month: 'long', year: 'numeric'
          });
        } catch(e) { formattedDate = regDate; }
      }

      var qrCount = stats.qr_payments_count || stats.qrCount || 0;
      var qrSum = stats.qr_payments_sum || stats.qrSum || 0;
      var depCount = stats.deposits_count || stats.depositsCount || 0;
      var depSum = stats.deposits_sum || stats.depositsSum || 0;
      var wdCount = stats.withdrawals_count || stats.withdrawalsCount || 0;
      var wdSum = stats.withdrawals_sum || stats.withdrawalsSum || 0;

      var avatarHtml;
      if (userPhotoUrl) {
        avatarHtml = '<div class="stats-user-avatar"><img src="' + escapeHtml(userPhotoUrl) + '" alt=""></div>';
      } else {
        avatarHtml = '<div class="stats-user-avatar"><span>' + escapeHtml(name.charAt(0).toUpperCase()) + '</span></div>';
      }

      content.innerHTML =
        '<div class="stats-user-info">' +
          avatarHtml +
          '<div>' +
            '<div class="stats-user-name">' + escapeHtml(name) + '</div>' +
            '<div class="stats-user-username">' + escapeHtml(username) + '</div>' +
            (formattedDate ? '<div class="stats-user-date">С ' + formattedDate + '</div>' : '') +
          '</div>' +
        '</div>' +
        '<div class="stats-grid">' +
          '<div class="stats-row">' +
            '<div class="stats-row-label"><span class="stats-row-label-icon">📱</span> QR-платежи</div>' +
            '<div class="stats-row-value">' + qrCount + ' / ' + formatNumber(qrSum, 2) + ' RUB</div>' +
          '</div>' +
          '<div class="stats-row">' +
            '<div class="stats-row-label"><span class="stats-row-label-icon">💰</span> Пополнения</div>' +
            '<div class="stats-row-value">' + depCount + ' / ' + formatNumber(depSum, 2) + ' USDT</div>' +
          '</div>' +
          '<div class="stats-row">' +
            '<div class="stats-row-label"><span class="stats-row-label-icon">💸</span> Выводы</div>' +
            '<div class="stats-row-value">' + wdCount + ' / ' + formatNumber(wdSum, 2) + ' USDT</div>' +
          '</div>' +
        '</div>';

    } catch(e) {
      content.innerHTML = '<div class="stats-loading">Не удалось загрузить статистику</div>';
    }
  }

  // Event listeners
  document.getElementById('profileBtn').addEventListener('click', openStats);
  document.getElementById('statsClose').addEventListener('click', closeStats);
  document.getElementById('statsOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeStats();
  });

  // Init
  autoAuth().then(function(data) {
    if (data) {
      showApp(data);
    } else {
      showNotTg();
    }
  });
})();
</script>
</body>
</html>
