<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Обменять — Moon Wallet</title>
<style>
:root {
  --bg: #0a1628; --card: #0f1d35; --card2: #132444; --border: #1c2f52;
  --text: #faf5ef; --muted: #b8a99a; --accent: #e8d5b7; --accent2: #d4b896;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  display: flex; justify-content: center;
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(30,60,114,.4) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(15,40,80,.3) 0%, transparent 60%);
}
.container { width: 100%; max-width: 480px; padding: 12px 16px 30px; }
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.back-btn {
  width: 40px; height: 40px; border-radius: 12px;
  background: var(--card); border: 1px solid var(--border);
  color: var(--accent); font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; text-decoration: none;
}
h1 { font-size: 22px; font-weight: 700; color: var(--accent); }
.placeholder {
  text-align: center; padding: 60px 20px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px;
}
.placeholder .icon { font-size: 56px; margin-bottom: 16px; }
.placeholder .title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.placeholder .desc { font-size: 14px; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <a href="index.html" class="back-btn">&larr;</a>
    <h1>Обменять</h1>
  </div>
  <div class="placeholder">
    <div class="icon">🔄</div>
    <div class="title">Скоро</div>
    <div class="desc">Раздел обмена валют находится в разработке</div>
  </div>
</div>
</body>
</html>
