<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QR Оплата</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg: #0a1628;
  --card: #0f1d35;
  --card2: #132444;
  --border: #1c2f52;
  --text: #faf5ef;
  --muted: #b8a99a;
  --accent: #e8d5b7;
  --accent2: #d4b896;
  --ok: #7dd3a8;
  --bad: #e88b8b;
  --warn: #e8c86b;
  --shadow: 0 12px 30px rgba(0,0,0,.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 480px;
  padding: 16px;
  padding-bottom: 40px;
}

.header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}

.back-btn {
  width: 40px; height: 40px; border-radius: 12px;
  background: var(--card); border: 1px solid var(--border);
  color: var(--accent); font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; text-decoration: none; flex-shrink: 0;
}

.header h1 { font-size: 22px; font-weight: 700; color: var(--accent); }

.balance-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 18px 20px;
  margin-bottom: 20px; box-shadow: var(--shadow);
}
.balance-label { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
.balance-value { font-size: 28px; font-weight: 700; color: var(--text); }
.balance-value span { font-size: 16px; color: var(--muted); font-weight: 400; }

/* Scan button */
.scan-section {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 28px 20px;
  box-shadow: var(--shadow); text-align: center;
  margin-bottom: 20px;
}
.scan-icon { font-size: 64px; margin-bottom: 16px; }
.scan-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.scan-desc { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }

.scan-btn {
  width: 100%; padding: 18px;
  border-radius: 16px; border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: var(--bg); font-size: 17px; font-weight: 700;
  font-family: inherit; cursor: pointer;
  transition: opacity .2s, transform .1s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.scan-btn:active { transform: scale(.98); }
.scan-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

/* QR result */
.qr-result {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 24px 20px;
  box-shadow: var(--shadow); display: none;
}
.qr-result.show { display: block; }

.qr-data-card {
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px; margin-bottom: 18px;
  word-break: break-all; font-size: 13px; color: var(--muted);
  line-height: 1.5;
}
.qr-data-card .label { color: var(--accent); font-weight: 700; font-size: 12px;
  text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
.qr-data-card .value { color: var(--text); font-size: 15px; font-weight: 600; }

.field { margin-bottom: 18px; }
.field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
.field input, .field textarea {
  width: 100%; background: var(--card2); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 16px; color: var(--text);
  font-size: 16px; font-family: inherit; outline: none; transition: border-color .2s;
}
.field input:focus, .field textarea:focus { border-color: var(--accent2); }
.field textarea { resize: vertical; min-height: 50px; }
.field input::placeholder, .field textarea::placeholder { color: #5a6b85; }

.amount-row { display: flex; gap: 12px; align-items: flex-end; }
.amount-row .field:first-child { flex: 1; }
.usdt-display {
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 16px; font-size: 16px;
  color: var(--ok); font-weight: 600; white-space: nowrap;
  min-width: 110px; text-align: center; height: 50px;
  display: flex; align-items: center; justify-content: center; margin-bottom: 18px;
}
.insufficient { color: var(--bad); font-size: 13px; margin-top: 6px; display: none; }
.insufficient.show { display: block; }

.submit-btn {
  width: 100%; padding: 16px; border-radius: 16px; border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: var(--bg); font-size: 16px; font-weight: 700;
  font-family: inherit; cursor: pointer; transition: opacity .2s, transform .1s;
}
.submit-btn:active { transform: scale(.98); }
.submit-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.submit-btn .spinner {
  display: inline-block; width: 18px; height: 18px;
  border: 2.5px solid rgba(10,22,40,.3); border-top-color: var(--bg);
  border-radius: 50%; animation: spin .6s linear infinite;
  vertical-align: middle; margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.rate-info { text-align: center; font-size: 12px; color: var(--muted); margin-top: 12px; }

.rescan-btn {
  width: 100%; padding: 12px; margin-top: 12px;
  border-radius: 14px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); font-size: 14px;
  font-weight: 500; font-family: inherit; cursor: pointer;
}
.rescan-btn:hover { border-color: var(--accent); color: var(--accent); }

.error-msg {
  background: rgba(232,139,139,.1); border: 1px solid rgba(232,139,139,.3);
  color: var(--bad); border-radius: 12px; padding: 12px 16px;
  font-size: 14px; margin-bottom: 16px; display: none;
}
.error-msg.show { display: block; }

.success-msg {
  background: rgba(125,211,168,.1); border: 1px solid rgba(125,211,168,.3);
  color: var(--ok); border-radius: 12px; padding: 16px;
  font-size: 16px; text-align: center; font-weight: 600; display: none;
}
.success-msg.show { display: block; }

/* Fallback upload (non-TG browser) */
.fallback-upload {
  display: none; text-align: center; margin-top: 16px;
  padding: 16px; border: 2px dashed var(--border); border-radius: 16px;
  cursor: pointer; position: relative;
}
.fallback-upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.fallback-upload .hint { color: var(--muted); font-size: 13px; }
.fallback-upload .hint b { color: var(--accent); }
.preview-img {
  max-width: 100%; max-height: 200px; border-radius: 12px;
  margin-top: 12px; display: none;
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <a href="index.html" class="back-btn">&larr;</a>
    <h1>QR Оплата</h1>
  </div>

  <div class="balance-card">
    <div class="balance-label">Ваш баланс</div>
    <div class="balance-value" id="balance">... <span>USDT</span></div>
  </div>

  <!-- Step 1: Scan -->
  <div class="scan-section" id="scanSection">
    <div class="scan-icon">📷</div>
    <div class="scan-title">Сканируй QR-код</div>
    <div class="scan-desc">Откройте камеру и наведите на QR-код<br>в магазине или на чеке</div>
    <button class="scan-btn" id="scanBtn" type="button">
      <span>📱</span> Сканировать QR-код
    </button>

    <!-- Fallback for non-TG browsers -->
    <div class="fallback-upload" id="fallbackUpload">
      <div class="hint">Или <b>загрузите фото</b> QR-кода</div>
      <input type="file" id="fileInput" accept="image/*" capture="environment">
      <img class="preview-img" id="previewImg" alt="">
    </div>
  </div>

  <!-- Step 2: Amount & confirm -->
  <div class="qr-result" id="qrResult">
    <div class="qr-data-card">
      <div class="label">Данные QR-кода</div>
      <div class="value" id="qrDataText">—</div>
    </div>

    <div class="amount-row">
      <div class="field">
        <label>Сумма (RUB)</label>
        <input type="number" id="amountRub" placeholder="0" min="0" step="any" inputmode="decimal">
      </div>
      <div class="usdt-display" id="usdtDisplay">0 USDT</div>
    </div>
    <div class="insufficient" id="insufficient">Недостаточно средств</div>

    <div class="field">
      <label>Заметка (необязательно)</label>
      <textarea id="note" placeholder="Комментарий..." rows="2"></textarea>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg">Отправлено на проверку!</div>

    <button class="submit-btn" id="submitBtn" disabled>Отправить на оплату</button>
    <div class="rate-info" id="rateInfo"></div>

    <button class="rescan-btn" id="rescanBtn" type="button">Сканировать другой QR</button>
  </div>
</div>

<script>
const TOKEN = localStorage.getItem('auth_token') || '';
const BASE = localStorage.getItem('worker_base') || 'https://client-qr-pay.kireeshka73.workers.dev';
const headers = { 'Authorization': 'Bearer ' + TOKEN };
const $ = id => document.getElementById(id);

let currentRate = null;
let currentBalance = null;
let qrData = '';
let qrImageB64 = '';

// ── Telegram WebApp QR Scanner ──
const tgApp = window.Telegram && window.Telegram.WebApp;

// Detect TG environment: platform !== 'unknown' OR initData exists OR tgWebAppData in URL
const isInsideTg = !!(tgApp && (
  (tgApp.platform && tgApp.platform !== 'unknown') ||
  (tgApp.initData && tgApp.initData.length > 0) ||
  window.location.hash.includes('tgWebAppData') ||
  window.location.search.includes('tgWebAppData')
));
const hasTgScanner = !!(isInsideTg && tgApp && typeof tgApp.showScanQrPopup === 'function');

if (tgApp) {
  try { tgApp.ready(); tgApp.expand(); } catch(_){}
}

// Debug info (can remove later)
console.log('[QR] tgApp:', !!tgApp,
  'platform:', tgApp && tgApp.platform,
  'initData len:', tgApp && tgApp.initData && tgApp.initData.length,
  'isInsideTg:', isInsideTg,
  'hasTgScanner:', hasTgScanner,
  'showScanQrPopup:', tgApp && typeof tgApp.showScanQrPopup);

// Show fallback only when NOT inside TG, or always as secondary option
$('fallbackUpload').style.display = isInsideTg ? 'none' : 'block';

$('scanBtn').onclick = () => {
  if (hasTgScanner) {
    try {
      tgApp.showScanQrPopup({ text: 'Наведите камеру на QR-код' }, (data) => {
        if (data) {
          try { tgApp.closeScanQrPopup(); } catch(_){}
          onQrScanned(data);
          return true; // close popup
        }
      });
    } catch(e) {
      console.warn('TG QR scanner error:', e);
      alert('Ошибка сканера: ' + e.message + '\nПопробуйте загрузить фото.');
      $('fallbackUpload').style.display = 'block';
      $('fileInput').click();
    }
  } else if (tgApp && typeof tgApp.showScanQrPopup === 'function') {
    // tgApp exists and has scanner but isInsideTg was false — try anyway
    try {
      tgApp.showScanQrPopup({ text: 'Наведите камеру на QR-код' }, (data) => {
        if (data) {
          try { tgApp.closeScanQrPopup(); } catch(_){}
          onQrScanned(data);
          return true;
        }
      });
    } catch(e) {
      console.warn('Fallback TG scanner also failed:', e);
      $('fileInput').click();
    }
  } else {
    $('fileInput').click();
  }
};

// Fallback: file upload
$('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const dataUrl = ev.target.result;
    $('previewImg').src = dataUrl;
    $('previewImg').style.display = 'block';

    // Extract base64
    qrImageB64 = dataUrl.split(',')[1] || '';
    // For fallback, we can't decode QR on client easily, so use "uploaded image" flow
    onQrScanned('QR_FROM_IMAGE');
  };
  reader.readAsDataURL(file);
});

function onQrScanned(data) {
  qrData = data;
  $('qrDataText').textContent = data.length > 200 ? data.slice(0, 200) + '...' : data;

  // Try to parse amount from QR (bank QR codes often have amount in them)
  const parsedAmount = parseAmountFromQr(data);
  if (parsedAmount > 0) {
    $('amountRub').value = parsedAmount;
    calcUsdt();
  }

  // Show result section, hide scan section
  $('scanSection').style.display = 'none';
  $('qrResult').classList.add('show');
  validateForm();
}

function parseAmountFromQr(data) {
  // Russian bank QR (ST00012) format: Sum=1234.56
  const mSum = data.match(/Sum=(\d+\.?\d*)/i);
  if (mSum) return parseFloat(mSum[1]);
  // Generic amount patterns
  const mAmt = data.match(/amount[=:](\d+\.?\d*)/i);
  if (mAmt) return parseFloat(mAmt[1]);
  return 0;
}

// Rescan
$('rescanBtn').onclick = () => {
  $('scanSection').style.display = '';
  $('qrResult').classList.remove('show');
  $('errorMsg').classList.remove('show');
  $('successMsg').classList.remove('show');
  $('submitBtn').style.display = '';
  $('submitBtn').disabled = true;
  $('amountRub').value = '';
  $('usdtDisplay').textContent = '0 USDT';
  $('insufficient').classList.remove('show');
  qrData = '';
  qrImageB64 = '';
};

// ── Load balance + rate ──
async function loadBalance() {
  try {
    const res = await fetch(BASE + '/api/me', { headers });
    const data = await res.json();
    const user = data.user || data;
    currentBalance = parseFloat(user.balance || 0);
    $('balance').innerHTML = currentBalance.toFixed(2) + ' <span>USDT</span>';
  } catch {
    $('balance').innerHTML = '— <span>USDT</span>';
  }
}

async function loadRate() {
  try {
    const res = await fetch(BASE + '/api/rate', { headers });
    const data = await res.json();
    currentRate = parseFloat(data.rate || 0);
    if (currentRate > 0) $('rateInfo').textContent = '1 USDT ≈ ' + currentRate.toFixed(2) + ' RUB';
  } catch {}
}

// ── Amount calc ──
$('amountRub').addEventListener('input', () => {
  clearTimeout($('amountRub')._t);
  $('amountRub')._t = setTimeout(calcUsdt, 200);
  validateForm();
});

function calcUsdt() {
  const rub = parseFloat($('amountRub').value);
  if (!rub || !currentRate) {
    $('usdtDisplay').textContent = '0 USDT';
    $('insufficient').classList.remove('show');
    return;
  }
  const usdt = rub / currentRate;
  $('usdtDisplay').textContent = usdt.toFixed(2) + ' USDT';
  if (currentBalance !== null && usdt > currentBalance) {
    $('insufficient').classList.add('show');
  } else {
    $('insufficient').classList.remove('show');
  }
}

function validateForm() {
  const hasQr = !!qrData;
  const hasAmount = parseFloat($('amountRub').value) > 0;
  $('submitBtn').disabled = !(hasQr && hasAmount);
}

// ── Submit ──
$('submitBtn').onclick = async () => {
  const btn = $('submitBtn');
  $('errorMsg').classList.remove('show');
  $('successMsg').classList.remove('show');

  const amountRub = parseFloat($('amountRub').value);
  if (!amountRub || amountRub <= 0) { showError('Введите сумму'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Отправка...';

  try {
    // Submit QR data + amount to worker
    const res = await fetch(BASE + '/api/qr/submit', {
      method: 'POST',
      headers: { ...headers, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        qrData,
        amountRub,
        note: $('note').value || '',
        image: qrImageB64 || '',
      })
    });

    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      throw new Error(d.error || 'Ошибка отправки');
    }

    $('successMsg').classList.add('show');
    btn.style.display = 'none';
    $('rescanBtn').style.display = 'none';

    setTimeout(() => { window.location.href = 'history.html'; }, 2000);
  } catch (e) {
    showError(e.message);
    btn.disabled = false;
    btn.innerHTML = 'Отправить на оплату';
  }
};

function showError(msg) {
  $('errorMsg').textContent = msg;
  $('errorMsg').classList.add('show');
}

loadBalance();
loadRate();
</script>
</body>
</html>
