<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Пополнение USDT</title>
<style>
:root {
  --bg: #0a1628;
  --card: #0f1d35;
  --card2: #132444;
  --border: #1c2f52;
  --text: #faf5ef;
  --muted: #b8a99a;
  --accent: #e8d5b7;
  --accent2: #d4b896;
  --ok: #7dd3a8;
  --bad: #e88b8b;
  --warn: #e8c86b;
  --shadow: 0 12px 30px rgba(0,0,0,.4);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; justify-content: center; padding: 16px;
}
.container { width: 100%; max-width: 480px; }
.header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 20px; padding: 8px 0;
}
.back-btn {
  background: var(--card2); border: 1px solid var(--border);
  color: var(--accent); width: 40px; height: 40px;
  border-radius: 12px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 20px; text-decoration: none; flex-shrink: 0;
}
.header h1 { font-size: 22px; font-weight: 700; }
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow);
}
.balance-row { display: flex; justify-content: space-between; align-items: center; }
.balance-label { color: var(--muted); font-size: 14px; }
.balance-value { font-size: 24px; font-weight: 700; color: var(--accent); }
.balance-currency { font-size: 14px; color: var(--muted); margin-left: 4px; }
.section-title {
  font-size: 14px; color: var(--muted); margin-bottom: 10px;
  text-transform: uppercase; letter-spacing: .5px;
}
.network-badge {
  display: inline-block; background: var(--card2); border: 1px solid var(--border);
  color: var(--accent); font-size: 13px; font-weight: 600;
  padding: 4px 12px; border-radius: 8px; margin-bottom: 14px;
}
.wallet-address-wrap {
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 16px; padding: 16px; cursor: pointer;
  transition: border-color .2s; word-break: break-all;
}
.wallet-address-wrap:hover { border-color: var(--accent2); }
.wallet-address { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.5; }
.copy-hint { display: flex; align-items: center; gap: 6px; margin-top: 10px; font-size: 12px; color: var(--muted); }
.instructions { font-size: 13px; color: var(--muted); line-height: 1.6; margin-top: 14px; }
.poll-status {
  text-align: center; padding: 16px; display: none; color: var(--muted); font-size: 14px;
}
.poll-status.show { display: block; }
.poll-status .spinner {
  display: inline-block; width: 20px; height: 20px;
  border: 2.5px solid var(--border); border-top-color: var(--ok);
  border-radius: 50%; animation: spin .8s linear infinite;
  vertical-align: middle; margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.credited-msg {
  text-align: center; padding: 20px; display: none;
  background: rgba(125,211,168,.1); border: 1px solid rgba(125,211,168,.3);
  border-radius: 16px; color: var(--ok); font-size: 18px; font-weight: 700;
  margin-bottom: 16px;
}
.credited-msg.show { display: block; }
.timer { font-size: 13px; color: var(--warn); text-align: center; margin-top: 10px; font-weight: 600; }
.history-item {
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 16px; padding: 14px 16px; margin-bottom: 10px;
}
.history-row { display: flex; justify-content: space-between; align-items: center; }
.history-amount { font-size: 16px; font-weight: 700; color: var(--ok); }
.history-date { font-size: 12px; color: var(--muted); }
.history-hash { font-size: 12px; color: var(--accent2); margin-top: 6px; word-break: break-all; }
.history-hash a { color: var(--accent2); text-decoration: underline dotted; }
.empty-state { text-align: center; color: var(--muted); font-size: 14px; padding: 20px 0; }
.error-msg {
  background: rgba(232,139,139,.1); border: 1px solid var(--bad);
  border-radius: 12px; padding: 12px 16px; color: var(--bad);
  font-size: 13px; text-align: center; margin-bottom: 16px; display: none;
}
.error-msg.show { display: block; }
.toast {
  position: fixed; bottom: 30px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--ok); color: var(--bg);
  padding: 10px 24px; border-radius: 12px; font-size: 14px; font-weight: 600;
  opacity: 0; transition: all .3s ease; z-index: 999; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.loading-card { text-align: center; padding: 30px 20px; color: var(--muted); }
.loading-card .spinner {
  display: inline-block; width: 28px; height: 28px;
  border: 3px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 12px;
}
.hidden { display: none; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <a href="index.html" class="back-btn">&larr;</a>
    <h1>Пополнение USDT</h1>
  </div>

  <div id="errorBox" class="error-msg"></div>

  <!-- Balance -->
  <div class="card">
    <div class="balance-row">
      <span class="balance-label">Ваш баланс</span>
      <div>
        <span class="balance-value" id="balanceValue">--</span>
        <span class="balance-currency">USDT</span>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div class="card" id="loadingCard">
    <div class="loading-card">
      <div class="spinner"></div>
      <div>Получаем адрес...</div>
    </div>
  </div>

  <!-- Address + polling -->
  <div id="depositView" class="hidden">
    <div class="card">
      <div class="section-title">Адрес для пополнения</div>
      <div id="networkBadge" class="network-badge"></div>
      <div class="wallet-address-wrap" onclick="copyAddress()">
        <div class="wallet-address" id="walletAddr"></div>
        <div class="copy-hint">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
          Нажмите, чтобы скопировать
        </div>
      </div>
      <div class="instructions">
        Отправьте любую сумму USDT на этот адрес — баланс зачислится <b>автоматически</b> в течение ~2 минут.
      </div>
      <div class="timer" id="timer"></div>
    </div>

    <div class="poll-status show" id="pollStatus">
      <span class="spinner"></span> Ожидаем перевод...
    </div>
  </div>

  <!-- Success -->
  <div class="credited-msg" id="creditedMsg">
    <div>Пополнение зачислено!</div>
    <div id="creditedAmount" style="font-size:14px;margin-top:8px;font-weight:500;opacity:.8;"></div>
  </div>

  <!-- History -->
  <div class="card">
    <div class="section-title">Последние пополнения</div>
    <div id="historyList">
      <div class="empty-state">Загрузка...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast">Скопировано!</div>

<script>
const TOKEN = localStorage.getItem('auth_token') || '';
const BASE = localStorage.getItem('worker_base') || 'https://client-qr-pay.kireeshka73.workers.dev';
const $ = id => document.getElementById(id);
const hdr = () => ({ 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' });

let depositWallet = '';
let pollTimer = null;
let countdownTimer = null;
let expiresAt = 0;

function showToast(msg) {
  const t = $('toast');
  t.textContent = msg || 'Скопировано!';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
function copyAddress() {
  if (!depositWallet) return;
  navigator.clipboard.writeText(depositWallet).then(() => showToast()).catch(() => {});
}
function showError(msg) {
  $('errorBox').textContent = msg;
  $('errorBox').classList.add('show');
}
function formatDate(d) {
  if (!d) return '';
  const dt = new Date(typeof d === 'number' ? d : d);
  return dt.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' }) +
    ' ' + dt.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
}
function truncate(s, n) {
  if (!s) return '';
  return s.length <= n ? s : s.slice(0, n/2) + '...' + s.slice(-n/2);
}

async function loadBalance() {
  try {
    const r = await fetch(BASE + '/api/me', { headers: hdr() });
    const d = await r.json();
    const bal = d.user ? d.user.balance : (d.balance || 0);
    $('balanceValue').textContent = parseFloat(bal).toFixed(2);
  } catch { $('balanceValue').textContent = '0.00'; }
}

async function createDepositRequest() {
  try {
    const r = await fetch(BASE + '/api/deposit/request', {
      method: 'POST', headers: hdr(), body: JSON.stringify({})
    });
    const d = await r.json();
    if (!r.ok || !d.ok) throw new Error(d.error || 'Ошибка');

    depositWallet = d.wallet;
    expiresAt = Date.now() + (d.expiresIn || 3600) * 1000;

    $('walletAddr').textContent = depositWallet;
    $('networkBadge').textContent = d.network || 'TRC20';

    $('loadingCard').classList.add('hidden');
    $('depositView').classList.remove('hidden');

    startPolling();
    startCountdown();
  } catch (e) {
    $('loadingCard').classList.add('hidden');
    showError('Ошибка получения адреса: ' + e.message);
  }
}

function startPolling() {
  stopPolling();
  pollTimer = setInterval(async () => {
    try {
      const r = await fetch(BASE + '/api/deposit/status', { headers: hdr() });
      const d = await r.json();
      if (d.ok && d.status === 'CREDITED') {
        stopPolling();
        stopCountdown();
        $('depositView').classList.add('hidden');
        $('creditedMsg').classList.add('show');
        if (d.amountUsdt > 0) {
          $('creditedAmount').textContent = '+' + parseFloat(d.amountUsdt).toFixed(2) + ' USDT зачислено на баланс';
        }
        loadBalance();
        loadHistory();
        setTimeout(() => { window.location.href = 'index.html'; }, 3000);
      }
    } catch {}
  }, 5000);
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}
function startCountdown() {
  stopCountdown();
  updateTimer();
  countdownTimer = setInterval(updateTimer, 1000);
}
function stopCountdown() {
  if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
}
function updateTimer() {
  const left = Math.max(0, expiresAt - Date.now());
  if (left <= 0) {
    $('timer').textContent = 'Время истекло — обновите страницу';
    stopPolling();
    return;
  }
  const m = Math.floor(left / 60000);
  const s = Math.floor((left % 60000) / 1000);
  $('timer').textContent = `Ожидание: ${m}:${String(s).padStart(2, '0')}`;
}

async function loadHistory() {
  const list = $('historyList');
  try {
    const r = await fetch(BASE + '/api/deposit/history', { headers: hdr() });
    const d = await r.json();
    const items = (d.items || []).slice(0, 5);
    if (!items.length) { list.innerHTML = '<div class="empty-state">Нет пополнений</div>'; return; }
    list.innerHTML = items.map(item => {
      const hash = item.txHash || '';
      let hashHtml = '';
      if (hash) {
        const url = 'https://tronscan.org/#/transaction/' + hash;
        hashHtml = '<div class="history-hash"><a href="' + url + '" target="_blank">' + truncate(hash, 30) + '</a></div>';
      }
      return '<div class="history-item">' +
        '<div class="history-row">' +
          '<span class="history-amount">+' + parseFloat(item.amountUsdt || 0).toFixed(2) + ' USDT</span>' +
          '<span class="history-date">' + formatDate(item.createdAt || item.date) + '</span>' +
        '</div>' + hashHtml + '</div>';
    }).join('');
  } catch { list.innerHTML = '<div class="empty-state">Ошибка загрузки</div>'; }
}

loadBalance();
loadHistory();
createDepositRequest();
</script>
</body>
</html>
