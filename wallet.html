<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Кошелёк — Moon Wallet</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg: #0a1628;
  --card: #0f1d35;
  --card2: #132444;
  --border: #1c2f52;
  --text: #faf5ef;
  --muted: #b8a99a;
  --accent: #e8d5b7;
  --accent2: #d4b896;
  --ok: #7dd3a8;
  --bad: #e88b8b;
  --warn: #e8c86b;
  --shadow: 0 12px 30px rgba(0,0,0,.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(30,60,114,.4) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(15,40,80,.3) 0%, transparent 60%);
}

.container { width: 100%; max-width: 480px; padding: 20px; padding-bottom: 40px; }

.header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 24px;
}
.back-btn {
  width: 40px; height: 40px; border-radius: 12px;
  background: var(--card); border: 1px solid var(--border);
  color: var(--accent); font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; text-decoration: none; flex-shrink: 0;
}
.header h1 { font-size: 22px; font-weight: 700; color: var(--accent); }

/* Balance display */
.balance-section {
  background: linear-gradient(145deg, var(--card), var(--card2));
  border: 1px solid var(--border);
  border-radius: 20px; padding: 28px 24px;
  margin-bottom: 24px; box-shadow: var(--shadow);
  text-align: center; position: relative; overflow: hidden;
}
.balance-section::before {
  content: ''; position: absolute; top: -40px; right: -40px;
  width: 120px; height: 120px;
  background: radial-gradient(circle, rgba(232,213,183,.06) 0%, transparent 70%);
  border-radius: 50%; pointer-events: none;
}
.bal-label { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.bal-usdt { font-size: 40px; font-weight: 800; letter-spacing: -1.5px; }
.bal-usdt span { font-size: 20px; color: var(--accent); font-weight: 600; margin-left: 4px; }
.bal-rub { font-size: 16px; color: var(--muted); margin-top: 6px; }

/* Action buttons */
.actions {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  margin-bottom: 24px;
}
.action-btn {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  padding: 22px 16px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; cursor: pointer; text-decoration: none;
  color: var(--text); font-family: inherit;
  transition: all .25s ease;
  -webkit-tap-highlight-color: transparent;
}
.action-btn:hover { border-color: var(--accent2); transform: translateY(-2px); }
.action-btn:active { transform: translateY(0) scale(.98); }
.action-btn .icon { font-size: 32px; }
.action-btn .label { font-size: 15px; font-weight: 600; }
.action-btn .desc { font-size: 12px; color: var(--muted); }

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeUp .5s ease forwards; }
.fd1 { animation-delay: .08s; opacity: 0; }
.fd2 { animation-delay: .16s; opacity: 0; }
</style>
</head>
<body>
<div class="container">
  <div class="header fade-in">
    <a href="index.html" class="back-btn">&larr;</a>
    <h1>Кошелёк</h1>
  </div>

  <div class="balance-section fade-in fd1">
    <div class="bal-label">Баланс</div>
    <div class="bal-usdt"><span id="balUsdt">...</span> <span>USDT</span></div>
    <div class="bal-rub" id="balRub"></div>
  </div>

  <div class="actions fade-in fd2">
    <a class="action-btn" href="deposit.html">
      <div class="icon">💰</div>
      <div class="label">Пополнить</div>
      <div class="desc">Добавить USDT</div>
    </a>
    <a class="action-btn" href="withdraw.html">
      <div class="icon">💸</div>
      <div class="label">Вывести</div>
      <div class="desc">Вывод USDT</div>
    </a>
  </div>
</div>

<script>
(function() {
  const tgApp = window.Telegram && window.Telegram.WebApp;
  if (tgApp) { try { tgApp.ready(); tgApp.expand(); } catch(_){} }

  const API = localStorage.getItem('worker_base') || 'https://client-qr-pay.kireeshka73.workers.dev';
  const TOKEN = localStorage.getItem('auth_token');
  if (!TOKEN) { window.location.href = 'index.html'; return; }

  const headers = { 'Authorization': 'Bearer ' + TOKEN };

  function fmt(n, d) {
    d = d || 2;
    return Number(n).toLocaleString('ru-RU', { minimumFractionDigits: d, maximumFractionDigits: d });
  }

  fetch(API + '/api/me', { headers })
    .then(r => r.json())
    .then(data => {
      const user = data.user || data;
      const bal = parseFloat(user.balance || 0);
      document.getElementById('balUsdt').textContent = fmt(bal);
      if (data.rate && data.rate > 0) {
        document.getElementById('balRub').textContent = '≈ ' + fmt(bal * data.rate) + ' ₽';
      }
    })
    .catch(() => {
      document.getElementById('balUsdt').textContent = '—';
    });
})();
</script>
</body>
</html>
